services:
  auth-service-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: bridge
    env_file:
      - ./.env.prod
    ports:
      - "${POSTGRES_SERVICE_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  app:
    build:
      context: .
      target: release
    restart: unless-stopped
    network_mode: bridge
    env_file:
      - ./.env.prod
    depends_on:
      auth-service-postgres:
        condition: service_healthy
    ports:
      - "${SERVICE_PORT:-30111}:30111"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
