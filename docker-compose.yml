services:
  auth-service-postgres:
    image: postgres:16-alpine
    container_name: auth-service-postgres
    restart: unless-stopped
    env_file:
      - ./.env.prod
    ports:
      - '55432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - ibahbalezin-net

  app:
    build:
      context: .
      target: release
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./.env.prod
    depends_on:
      auth-service-postgres:
        condition: service_healthy
    ports:
      - '30111:3001'
    networks:
      - ibahbalezin-net

volumes:
  postgres-data:

networks:
  ibahbalezin-net:
    driver: bridge
